name: CI/CD - Frontend

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yaml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yaml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Override image tag (default: git short SHA)"
        required: false
        type: string

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: tomato-board-web
  # GitOps: yq '.image.tag = env(IMAGE_TAG)' — values 구조 image.repository / image.tag 와 일치해야 함
  GITOPS_VALUES_PATH: tomato_board/front/values.yaml

jobs:
  ci:
    runs-on: ubuntu-latest
    outputs:
      # format() prevents numeric-only SHAs from being coerced to scientific notation (e.g. 3.711647e+06)
      image_tag: ${{ format('{0}', steps.version.outputs.tag) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: version
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="sha-$(git rev-parse --short=7 HEAD)"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pre-pull BuildKit image
        run: |
          for attempt in 1 2 3; do
            if docker pull moby/buildkit:buildx-stable-1; then
              exit 0
            fi
            echo "BuildKit pull failed (attempt ${attempt}/3). Retrying in 15s..."
            sleep 15
          done
          exit 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        timeout-minutes: 10

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ format('{0}', steps.version.outputs.tag) }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cd:
    needs: [ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: oldentomato/localInfra
          ref: main
          token: ${{ secrets.PAT }}

      - name: Update image tag in values.yaml
        uses: mikefarah/yq@master
        env:
          IMAGE_TAG: ${{ format('{0}', needs.ci.outputs.image_tag) }}
        with:
          cmd: yq eval -i '.image.tag = env(IMAGE_TAG)' './${{ env.GITOPS_VALUES_PATH }}'

      - name: Commit manifest changes
        env:
          IMAGE_TAG: ${{ format('{0}', needs.ci.outputs.image_tag) }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add "./${{ env.GITOPS_VALUES_PATH }}"
          git commit -m "ci(frontend): update image tag to ${IMAGE_TAG}" || echo "No changes to commit"

      - name: Push commit
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.PAT }}
          repository: oldentomato/localInfra
