services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      FRONTEND_URL: http://localhost:3000
      OAUTH_CALLBACK_URL: http://localhost:8080/api/auth/google/callback
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
