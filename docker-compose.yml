services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      FRONTEND_URL: http://localhost
      OAUTH_CALLBACK_URL: http://localhost/auth/google/callback
      CORS_ORIGINS: http://localhost,http://localhost:3000
    expose:
      - "8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost
    environment:
      NEXT_PUBLIC_API_URL: http://localhost
      API_PROXY_TARGET: http://backend:8080
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy-headers.conf:/etc/nginx/snippets/proxy-headers.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
